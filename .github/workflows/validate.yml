name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-plugin:
    name: Plugin Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace manifest schema
        run: claude plugin validate .

      - name: Validate plugin manifest schema
        run: claude plugin validate .claude-plugin/plugin.json

      - name: Validate JSON syntax
        run: |
          echo "Validating plugin.json..."
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          echo "Validating marketplace.json..."
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          echo "All JSON files are valid"

  validate-markdown:
    name: Markdown Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Ensure PyYAML is available for frontmatter validation
        run: python3 -c "import yaml" || pip install pyyaml

      - name: Lint markdown files
        run: npm run validate:md

      - name: Validate skill, agent, and command structure
        run: npm run validate:skills

      - name: Check links in markdown
        run: npm run validate:links
        continue-on-error: true

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate-plugin, validate-markdown]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: release
        run: |
          npx semantic-release
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION="${LATEST_TAG#v}"
          CURRENT=$(node -e "console.log(require('./package.json').version)")
          if [ "$VERSION" != "$CURRENT" ]; then
            echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version bump PR
        if: steps.release.outputs.new_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.new_version }}
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', '.claude-plugin/plugin.json']) {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = process.argv[1];
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            }
          " "$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/version-bump-${VERSION}"
          git checkout -b "$BRANCH"
          git add package.json .claude-plugin/plugin.json
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(release): ${VERSION}" \
            --body "Auto-generated version bump from release v${VERSION}." \
            --label "released")
          gh pr merge "$PR_URL" --squash --auto
