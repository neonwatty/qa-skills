name: Eval

on:
  pull_request:
    paths:
      - 'skills/**/*.md'
      - 'agents/*.md'
      - 'scripts/validate-workflows.sh'
      - 'docs/workflow-format.md'
      - 'eval/ground-truth/**'
      - 'eval/harness/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eval/reference-app/package-lock.json

      - name: Install reference app dependencies
        run: cd eval/reference-app && npm ci

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run eval (validate stage only)
        run: ./eval/harness/eval.sh --stage validate --platform desktop

      - name: Post results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsFile = 'eval/results/history.jsonl';
            let body = '## Eval Results\n\n';

            if (fs.existsSync(resultsFile)) {
              const lines = fs.readFileSync(resultsFile, 'utf8').trim().split('\n');
              const latest = JSON.parse(lines[lines.length - 1]);

              body += '| Metric | Score |\n';
              body += '|--------|-------|\n';
              body += `| Mechanical checks | ${latest.mechanical_checks} |\n`;
              body += `| Route coverage | ${Math.round(latest.route_coverage * 100)}% |\n`;
              body += `| Entity coverage | ${Math.round(latest.entity_coverage * 100)}% |\n`;
              body += `| Workflow count | ${latest.workflow_count} (gt: ${latest.workflow_count_gt}) |\n`;
              body += `| Verify quality | ${Math.round(latest.verify_visibility_pct * 100)}% vis-only |\n`;
              body += `| Runner | ${latest.runner_pass_rate ?? 'N/A'} |\n`;
              body += `| Converter | ${latest.converter_compiles ?? 'N/A'} |\n`;
            } else {
              body += '⚠️ No results file found. Eval may have failed.\n';
            }

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('## Eval Results'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
